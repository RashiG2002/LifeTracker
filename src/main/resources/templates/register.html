<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LifeTracker</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card animate-fade-up">
            <div class="auth-header">
                <h1><div class="logo-badge">LT</div> LifeTracker</h1>
                <p>Create a new account</p>
            </div>
            
            <div th:if="${error}" class="alert alert-danger animate-fade-up" style="animation-delay: 0.1s;">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            </div>
            
            <form th:action="@{/register}" method="post" th:object="${user}" class="animate-fade-up" style="animation-delay: 0.2s;">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" 
                           placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" 
                           placeholder="Enter your email address" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" 
                           placeholder="Create a password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 14px; padding: 16px;">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </form>
            
            <div class="auth-footer mt-4 animate-fade-up" style="text-align: center; color: var(--text-secondary); animation-delay: 0.3s;">
                Already have an account? <a th:href="@{/login}" style="font-weight: 600;">Login here</a>
            </div>
        </div>
    </div>
</body>
</html>
